name: Numdle - Retrain AI and Deploy

on:
  workflow_dispatch:
    inputs:
      server_url:
        description: 'Backend URL to download logs from'
        required: false
        default: ''
        type: string
      admin_key:
        description: 'Admin key (leave blank to use saved secret)'
        required: false
        default: ''
        type: string
      weeks_ahead:
        description: 'How many weeks to precompute ahead'
        required: false
        default: '2'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
      skip_training:
        description: 'Skip AI fine-tuning (just precompute)'
        required: false
        default: false
        type: boolean

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install tensorflow numpy flask pandas

      - name: Resolve config
        id: cfg
        run: |
          URL="${{ inputs.server_url }}"
          KEY="${{ inputs.admin_key }}"
          [ -z "$URL" ] && URL="${{ secrets.NUMDLE_SERVER_URL }}"
          [ -z "$KEY" ] && KEY="${{ secrets.NUMDLE_ADMIN_KEY }}"
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "key=$KEY" >> $GITHUB_OUTPUT
          echo "Using server: $URL"

      - name: Download game logs
        id: fetch_logs
        run: |
          URL="${{ steps.cfg.outputs.url }}"
          KEY="${{ steps.cfg.outputs.key }}"
          WEEK=$(python3 -c "from datetime import date,timedelta; d=date.today(); print((d-timedelta(days=d.weekday())).isoformat())")
          echo "Downloading logs for week $WEEK from $URL"
          STATUS=$(curl -s -o logs/week_${WEEK}.json \
            -w "%{http_code}" \
            -H "X-Admin-Key: $KEY" \
            "$URL/admin/logs/export")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            LINES=$(python3 -c "import json; d=json.load(open('logs/week_${WEEK}.json')); print(len(d.get('games',[])))" 2>/dev/null || echo "?")
            echo "Downloaded $LINES game records"
            echo "log_file=logs/week_${WEEK}.json" >> $GITHUB_OUTPUT
            echo "has_logs=true" >> $GITHUB_OUTPUT
          else
            echo "::warning::Download failed (HTTP $STATUS) - training will be skipped"
            echo "has_logs=false" >> $GITHUB_OUTPUT
          fi

      - name: Fine-tune AI on human game logs
        if: ${{ !inputs.skip_training && steps.fetch_logs.outputs.has_logs == 'true' }}
        run: |
          echo "Fine-tuning on: ${{ steps.fetch_logs.outputs.log_file }}"
          python train_on_logs.py "${{ steps.fetch_logs.outputs.log_file }}" --epochs 20

      - name: Precompute next weeks
        run: python precompute.py --next-week --weeks ${{ inputs.weeks_ahead }}

      - name: Commit and push
        run: |
          git config user.name  "numdle-bot"
          git config user.email "numdle-bot@users.noreply.github.com"
          git add public/daily_data.json
          git add logs/ai_game_log.json
          git add "logs/week_*.json" 2>/dev/null || true
          git add ../number_guessing_rl/checkpoints_7q/human_finetuned.weights.h5 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing new - skipping commit"
          else
            git commit -m "update: retrain + precompute $(date +%Y-%m-%d)"
            git push origin HEAD
          fi

      - name: Deploy to PythonAnywhere
        if: always()
        run: |
          URL="${{ steps.cfg.outputs.url }}"
          KEY="${{ steps.cfg.outputs.key }}"
          curl -s -X POST -H "X-Admin-Key: $KEY" "$URL/dev/deploy" \
            && echo "PythonAnywhere reloaded" \
            || echo "Deploy ping failed (non-fatal)"
