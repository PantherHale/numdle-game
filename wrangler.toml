name = "numdle"
compatibility_date = "2024-09-23"

# Cloudflare Pages static deployment
# Run: wrangler pages deploy public --project-name=numdle
#
# Required GitHub Actions secrets:
#   CLOUDFLARE_API_TOKEN  — API token with Cloudflare Pages:Edit permission
#   CLOUDFLARE_ACCOUNT_ID — your Cloudflare account ID
#   NUMDLE_SERVER_URL     — URL of your Flask server e.g. https://numdle.onrender.com
#   NUMDLE_ADMIN_KEY      — value of NUMDLE_ADMIN_KEY env var on the server
#
# Flask server environment variables (set on your hosting platform):
#   NUMDLE_ADMIN_KEY      — random secret for /admin/logs/export
#   SECRET_KEY            — random secret for Flask sessions (optional)
